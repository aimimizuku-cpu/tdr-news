name: 待ち時間データ収集

on:
  schedule:
    # JST 7:40〜22:40 の間、20分ごと（cron は UTC）
    - cron: '*/20 0-13,22-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: データ収集
        run: node scripts/collect.mjs
      - name: コミット
        run: |
          git config user.name "tdr-news-bot"
          git config user.email "actions@github.com"
          git add data/today.json data/history.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "データ収集 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
