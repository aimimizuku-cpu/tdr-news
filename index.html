<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TDR ニュース｜東京ディズニーリゾート最新情報ダッシュボード</title>
<meta name="description" content="東京ディズニーリゾートの最新ニュース・グッズ・フード・イベント情報とXの投稿をまとめてチェックできる非公式ダッシュボード">
<meta name="theme-color" content="#1F82BF">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%231F82BF'/%3E%3Cstop offset='1' stop-color='%2350BFBF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' transform='translate(1.5 2) scale(.85)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rainbow-bar"></div>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">TDR ニュース</div>
        <div class="brand-sub">最新情報ダッシュボード</div>
      </div>
    </div>

    <div class="searchbox">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" type="search" placeholder="ニュースを検索（例：グッズ、パレード）" autocomplete="off">
    </div>

    <div class="header-actions">
      <button id="saved-btn" class="saved-chip" title="保存した記事だけ表示">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1F82BF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>保存 <span id="saved-count">0</span></span>
      </button>
      <button id="refresh-btn" class="icon-btn" title="最新の情報に更新">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#5b6068" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <button id="bell-btn" class="icon-btn" title="新着記事だけ表示">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5b6068" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span id="bell-dot" class="bell-dot" hidden></span>
      </button>
    </div>
  </div>

  <div class="facility-tabs" id="facility-tabs"></div>
</header>

<main class="layout">
  <section class="news-col">
    <div id="hero" class="hero" hidden></div>

    <div class="type-filters" id="type-filters"></div>

    <div class="result-bar">
      <div class="result-count"><span id="result-count">0</span> 件の情報</div>
      <div class="result-label" id="current-label"></div>
    </div>

    <div id="news-grid" class="news-grid"></div>

    <div id="news-empty" class="empty-box" hidden>
      <div class="empty-title">該当する情報がありません</div>
      <div class="empty-sub">フィルターや検索条件を変えてお試しください。</div>
    </div>

    <div id="news-loading" class="skeleton-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </section>

  <aside class="x-col">
    <div class="x-panel">
      <div class="x-head">
        <div class="x-logo">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <div class="x-head-text">
          <div class="x-title">リアルタイムフィード</div>
          <div class="x-sub">フォロー中のアカウント</div>
        </div>
        <div class="live-badge">
          <span class="live-dot"><span class="live-pulse"></span><span class="live-core"></span></span>
          LIVE
        </div>
      </div>

      <div class="x-chips" id="x-chips"></div>

      <form class="x-add" id="x-add-form">
        <span class="x-add-at">@</span>
        <input id="x-add-input" type="text" placeholder="アカウントを追加（例：TDR_PR）" autocomplete="off" pattern="[A-Za-z0-9_]{1,15}" title="英数字とアンダースコアのみ（15文字まで）">
        <button type="submit">追加</button>
      </form>

      <div class="x-feed" id="x-feed">
        <div class="x-loading" id="x-loading">
          <div class="skeleton-tweet"></div><div class="skeleton-tweet"></div><div class="skeleton-tweet"></div>
        </div>
      </div>

      <div class="x-note">※ Xの仕様上、取得できる投稿は遅延・欠落する場合があります。<span id="x-updated"></span></div>
    </div>
  </aside>
</main>

<footer class="site-footer">
  非公式・ファンメイドのニュースまとめサイトです。記事は Google ニュース等の公開フィードから自動収集しており、著作権は各配信元に帰属します。
</footer>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
